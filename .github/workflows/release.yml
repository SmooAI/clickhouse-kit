name: Release (Changesets 🦋)

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  CI: true

jobs:
  version:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    # Publish to npm only when an NPM_TOKEN secret is configured; otherwise run in
    # version-only mode (open the "Version Packages" PR when changesets exist).
    # This keeps the workflow green before npm publishing is set up, and starts
    # publishing automatically once the token is added — no further edits needed.
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Changesets — version (+ publish when NPM_TOKEN present) 🦋
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: ${{ env.HAS_NPM_TOKEN == 'true' && 'pnpm ci:publish' || '' }}
          commit: "🦋 New version release"
          title: "🦋 New version release"
          createGithubReleases: ${{ env.HAS_NPM_TOKEN == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
